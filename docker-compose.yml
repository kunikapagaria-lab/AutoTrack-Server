version: '3.9'

services:
  backend:
    image: ${DOCKERHUB_USERNAME}/autotrack-backend:latest
    restart: unless-stopped
    volumes:
      - ./backend/.env:/app/backend/.env:ro   # secrets — never baked into image
      - ./backend/data:/app/backend/data       # SQLite database — persists across updates
      - uploads:/app/backend/uploads           # local image fallback
      - paddleocr_cache:/root/.paddleocr       # OCR models cache
    environment:
      - PYTHONUNBUFFERED=1

  frontend:
    image: ${DOCKERHUB_USERNAME}/autotrack-frontend:latest
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

  watchtower:
    image: containrrr/watchtower:1.7.1
    restart: unless-stopped
    volumes:
      - //var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_POLL_INTERVAL=300   # check Docker Hub every 5 minutes
      - WATCHTOWER_CLEANUP=true        # remove old images after update
      - WATCHTOWER_INCLUDE_RESTARTING=true
      - DOCKER_API_VERSION=1.43

volumes:
  uploads:
  paddleocr_cache:
