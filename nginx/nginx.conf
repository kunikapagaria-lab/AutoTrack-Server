server {
    listen 80;
    server_name _;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;

    # API proxy — strips /api prefix before forwarding to FastAPI
    # e.g. GET /api/vehicles → GET /vehicles on backend:8000
    location /api/ {
        proxy_pass         http://backend:8000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_buffering    off;        # required for MJPEG video streaming
        client_max_body_size 10m;     # allow vehicle image uploads
    }

    # Vehicle images stored locally on the backend — proxy directly
    location /uploads/ {
        proxy_pass         http://backend:8000/uploads/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_read_timeout 30s;
    }

    # React SPA — all non-file routes serve index.html
    location / {
        root      /usr/share/nginx/html;
        index     index.html;
        try_files $uri $uri/ /index.html;
    }
}
