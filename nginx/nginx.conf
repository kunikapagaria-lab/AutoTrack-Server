server {
    listen 80;
    server_name _;

    # Use Docker's internal DNS resolver with 10s TTL so nginx automatically
    # picks up the new backend IP after Watchtower restarts the backend container.
    # Without this, nginx caches the old IP and returns 502 until frontend restarts.
    resolver 127.0.0.11 valid=10s ipv6=off;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;

    # API proxy — strips /api prefix before forwarding to FastAPI
    location /api/ {
        rewrite        ^/api(/.*)$ $1 break;
        set            $backend "backend:8000";
        proxy_pass         http://$backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_buffering    off;
        client_max_body_size 10m;
    }

    # Vehicle images stored locally on the backend
    location /uploads/ {
        set            $backend "backend:8000";
        proxy_pass         http://$backend;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_read_timeout 30s;
    }

    # React SPA — all non-file routes serve index.html
    location / {
        root      /usr/share/nginx/html;
        index     index.html;
        try_files $uri $uri/ /index.html;
    }
}
