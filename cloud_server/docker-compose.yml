version: '3.9'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - ./.env:/app/.env:ro   # secrets — never baked into the image
      - cloud_db:/app/data    # persistent DB
    environment:
      - PYTHONUNBUFFERED=1

  frontend:
    build:
      context: ..             # project root — needs Dockerfile.frontend and nginx/nginx.conf
      dockerfile: Dockerfile.frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  cloud_db:
