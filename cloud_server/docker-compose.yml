version: '3.9'

services:
  backend:
    image: ${DOCKERHUB_USERNAME}/autotrack-cloud:latest
    restart: unless-stopped
    volumes:
      - ./data:/app/data          # persistent cloud SQLite database
      - ./.env:/app/.env:ro       # secrets
    environment:
      - PYTHONUNBUFFERED=1

  frontend:
    image: ${DOCKERHUB_USERNAME}/autotrack-frontend:latest
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

  watchtower:
    image: containrrr/watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_POLL_INTERVAL=300   # check Docker Hub every 5 minutes
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_INCLUDE_RESTARTING=true

volumes:
  cloud_db:
